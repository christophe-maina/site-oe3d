<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Vue stylisée des Îles du Salut au crépuscule">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2c4a"/>
      <stop offset="35%" stop-color="#3b3a5a"/>
      <stop offset="60%" stop-color="#c0392b"/>
      <stop offset="78%" stop-color="#f5b041"/>
      <stop offset="100%" stop-color="#fde0a8"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a4a5e"/>
      <stop offset="60%" stop-color="#0e2030"/>
      <stop offset="100%" stop-color="#050d14"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe7a8"/>
      <stop offset="40%" stop-color="#f5b041" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f5b041" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="island" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08151f"/>
      <stop offset="100%" stop-color="#000204"/>
    </linearGradient>
  </defs>

  <!-- Ciel -->
  <rect width="1920" height="700" fill="url(#sky)"/>

  <!-- Soleil couchant -->
  <circle cx="960" cy="640" r="220" fill="url(#sun)"/>
  <circle cx="960" cy="640" r="60" fill="#fff5d6" opacity="0.95"/>

  <!-- Reflet du soleil dans l'eau -->
  <ellipse cx="960" cy="780" rx="180" ry="14" fill="#f5b041" opacity="0.55"/>
  <ellipse cx="960" cy="820" rx="240" ry="10" fill="#f5b041" opacity="0.35"/>
  <ellipse cx="960" cy="860" rx="300" ry="8"  fill="#f5b041" opacity="0.20"/>

  <!-- Mer -->
  <rect y="700" width="1920" height="380" fill="url(#sea)"/>

  <!-- Île du Diable (gauche, plus petite, plus lointaine) -->
  <path d="M 280 730 Q 360 690 450 705 Q 540 712 600 730 L 600 740 L 280 740 Z" fill="url(#island)" opacity="0.85"/>
  <!-- Petits palmiers Île du Diable -->
  <line x1="380" y1="700" x2="380" y2="720" stroke="#000" stroke-width="2"/>
  <path d="M 380 700 Q 372 695 364 698 M 380 700 Q 388 695 396 698 M 380 700 Q 376 692 372 690 M 380 700 Q 384 692 388 690" stroke="#000" stroke-width="2" fill="none"/>
  <line x1="450" y1="695" x2="450" y2="715" stroke="#000" stroke-width="2"/>
  <path d="M 450 695 Q 442 690 434 693 M 450 695 Q 458 690 466 693 M 450 695 Q 446 687 442 685 M 450 695 Q 454 687 458 685" stroke="#000" stroke-width="2" fill="none"/>

  <!-- Île Royale (centre, principale) -->
  <path d="M 760 740 Q 880 670 1080 660 Q 1240 670 1340 740 L 1340 750 L 760 750 Z" fill="url(#island)"/>
  <!-- Phare / silhouette de la Transportation -->
  <rect x="1040" y="640" width="6" height="22" fill="#000"/>
  <rect x="1036" y="636" width="14" height="6" fill="#000"/>
  <!-- Palmiers Île Royale -->
  <g stroke="#000" stroke-width="2.5" fill="none">
    <line x1="860" y1="675" x2="860" y2="700"/>
    <path d="M 860 675 Q 848 668 836 672 M 860 675 Q 872 668 884 672 M 860 675 Q 854 663 848 660 M 860 675 Q 866 663 872 660"/>
    <line x1="940" y1="668" x2="940" y2="700"/>
    <path d="M 940 668 Q 926 660 912 664 M 940 668 Q 954 660 968 664 M 940 668 Q 933 654 926 650 M 940 668 Q 947 654 954 650"/>
    <line x1="1180" y1="670" x2="1180" y2="700"/>
    <path d="M 1180 670 Q 1168 663 1156 666 M 1180 670 Q 1192 663 1204 666 M 1180 670 Q 1174 658 1168 655 M 1180 670 Q 1186 658 1192 655"/>
    <line x1="1260" y1="678" x2="1260" y2="705"/>
    <path d="M 1260 678 Q 1250 672 1240 675 M 1260 678 Q 1270 672 1280 675 M 1260 678 Q 1255 668 1250 665 M 1260 678 Q 1265 668 1270 665"/>
  </g>

  <!-- Île Saint-Joseph (droite) -->
  <path d="M 1480 735 Q 1580 690 1700 695 Q 1800 705 1860 735 L 1860 745 L 1480 745 Z" fill="url(#island)" opacity="0.92"/>
  <g stroke="#000" stroke-width="2" fill="none">
    <line x1="1580" y1="700" x2="1580" y2="725"/>
    <path d="M 1580 700 Q 1572 694 1564 697 M 1580 700 Q 1588 694 1596 697 M 1580 700 Q 1576 692 1572 690 M 1580 700 Q 1584 692 1588 690"/>
    <line x1="1700" y1="695" x2="1700" y2="720"/>
    <path d="M 1700 695 Q 1692 689 1684 692 M 1700 695 Q 1708 689 1716 692 M 1700 695 Q 1696 687 1692 685 M 1700 695 Q 1704 687 1708 685"/>
  </g>

  <!-- Vagues subtiles -->
  <path d="M 0 850 Q 480 840 960 850 T 1920 850" stroke="#1a3344" stroke-width="1.5" fill="none" opacity="0.6"/>
  <path d="M 0 920 Q 480 910 960 920 T 1920 920" stroke="#0a1e2c" stroke-width="1.2" fill="none" opacity="0.5"/>
  <path d="M 0 990 Q 480 980 960 990 T 1920 990" stroke="#06121b" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Quelques étoiles dans le haut du ciel -->
  <g fill="#fff" opacity="0.7">
    <circle cx="180"  cy="80"  r="1.2"/>
    <circle cx="420"  cy="140" r="1"/>
    <circle cx="700"  cy="60"  r="1.3"/>
    <circle cx="1100" cy="120" r="1"/>
    <circle cx="1380" cy="80"  r="1.4"/>
    <circle cx="1620" cy="160" r="1"/>
    <circle cx="1820" cy="90"  r="1.2"/>
  </g>

  <!-- Vignetage subtil -->
  <radialGradient id="vignette" cx="50%" cy="50%" r="75%">
    <stop offset="65%" stop-color="#000" stop-opacity="0"/>
    <stop offset="100%" stop-color="#000" stop-opacity="0.55"/>
  </radialGradient>
  <rect width="1920" height="1080" fill="url(#vignette)"/>
</svg>
